name: 功能建议
description: 建议新的诊断能力、交互改进或平台支持
title: "[Feature] "
labels:
  - enhancement
  - needs-triage
body:
  - type: markdown
    attributes:
      value: |
        请从实际问题出发描述需求。公开 Issue 中不要包含真实网络标识、账号或未经脱敏的日志。

  - type: dropdown
    id: platform
    attributes:
      label: 目标平台
      multiple: true
      options:
        - macOS
        - Windows
        - iOS / iPadOS
        - Android
        - 跨平台
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: 想解决的问题
      description: 目前什么场景难以完成，或者哪类结论不够清楚？
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: 建议方案
      description: 描述希望看到的行为或结果，不要求提供实现代码。
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 已尝试的方法
      description: 可选。说明现有工具或替代流程为什么不能满足需求。

  - type: checkboxes
    id: confirmations
    attributes:
      label: 提交前确认
      options:
        - label: 我已搜索现有 Issue，没有找到相同建议。
          required: true
        - label: 内容中不包含凭据、真实网络标识或个人信息。
          required: true
